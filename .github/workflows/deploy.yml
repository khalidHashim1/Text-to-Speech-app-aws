name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'frontend/**'    # Only run deploy if frontend files changed
      - 'backend/**'     # Include if Lambda/backend code changed
      - '.github/**'

jobs:

  #################################
  # 1️⃣ RUN TESTS (DEV + MAIN)
  #################################
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest

      - name: Run backend tests
        run: |
          cd backend
          pytest || echo "No tests yet"

  #################################
  # 2️⃣ DEPLOY (MAIN ONLY)
  #################################
  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      ##############################
      # Upload Frontend to S3
      ##############################
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Sync frontend to S3
        run: |
          aws s3 sync frontend s3://${{ secrets.AWS_S3_BUCKET }} --delete

      ##############################
      # Deploy Lambda
      ##############################
      - name: Deploy Lambda function
        run: |
          cd backend
          pip install -r requirements.txt -t .
          zip -r ../lambda.zip .
          cd ..
      
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --zip-file fileb://lambda.zip

      ##############################
      # Invalidate CloudFront
      ##############################
      - name: Invalidate CloudFront cache
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $DISTRIBUTION_ID \
            --paths "/*"
