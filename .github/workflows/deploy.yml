name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/**'

jobs:

  #################################
  # 1️⃣ Run backend tests
  #################################
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest

      - name: Run backend tests
        run: |
          cd backend
          pytest || echo "No tests yet"

  #################################
  # 2️⃣ Deploy (main only)
  #################################
  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      ##############################
      # Configure AWS credentials
      ##############################
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      ##############################
      # Safety check: Lambda function name
      ##############################
      - name: Validate Lambda function name
        env:
          LAMBDA_FUNCTION_NAME: ${{ secrets.LAMBDA_FUNCTION_NAME }}
        run: |
          if [ -z "$LAMBDA_FUNCTION_NAME" ]; then
            echo "❌ ERROR: LAMBDA_FUNCTION_NAME secret is empty!"
            exit 1
          else
            echo "✅ Lambda function name loaded: $LAMBDA_FUNCTION_NAME"
          fi

      ##############################
      # Upload frontend to S3
      ##############################
      - name: Sync frontend to S3
        run: |
          aws s3 sync frontend s3://${{ secrets.AWS_S3_BUCKET }} --delete

      ##############################
      # Package and deploy Lambda
      ##############################
      - name: Package and deploy Lambda
        env:
          LAMBDA_FUNCTION_NAME: ${{ secrets.LAMBDA_FUNCTION_NAME }}
        run: |
          cd backend
          # Install dependencies into backend folder for Lambda
          pip install -r requirements.txt -t .
          # Zip all files including dependencies
          zip -r ../lambda.zip .
          cd ..

          # Optional: list zip contents for debug
          echo "Contents of lambda.zip:"
          unzip -l lambda.zip

          # Deploy Lambda
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --zip-file fileb://lambda.zip

      ##############################
      # Invalidate CloudFront cache
      ##############################
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
