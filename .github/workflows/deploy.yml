name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/**'

jobs:

  #################################
  # 1️⃣ Run backend tests
  #################################
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest

      - name: Run backend tests
        run: |
          cd backend
          pytest || echo "⚠️ No tests yet"

  #################################
  # 2️⃣ Deploy (main only)
  #################################
  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      ##############################
      # Configure AWS credentials
      ##############################
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      ##############################
      # Validate Lambda secret
      ##############################
      - name: Validate Lambda function name
        run: |
          if [ -z "${{ secrets.LAMBDA_FUNCTION_NAME }}" ]; then
            echo "❌ ERROR: LAMBDA_FUNCTION_NAME secret is empty!"
            exit 1
          else
            echo "✅ Lambda function name loaded"
          fi

      ##############################
      # Sync frontend to S3
      ##############################
      - name: Sync frontend to S3
        run: |
          aws s3 sync frontend s3://${{ secrets.AWS_S3_BUCKET }} --delete

      ##############################
      # Package and deploy Lambda
      ##############################
      - name: Package and deploy Lambda
        env:
          LAMBDA_FUNCTION_NAME: ${{ secrets.LAMBDA_FUNCTION_NAME }}
        run: |
          cd backend

          # Install dependencies into the folder for Lambda
          pip install -r requirements.txt -t .

          # Create zip package
          zip -r ../lambda.zip .

          cd ..

          # Debug: only count files instead of printing all
          echo "Lambda package created with total files:"
          unzip -l lambda.zip | wc -l

          # Deploy to Lambda
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --zip-file fileb://lambda.zip

      ##############################
      # Invalidate CloudFront
      ##############################
      - name: Invalidate CloudFront cache
        env:
          DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/*"
