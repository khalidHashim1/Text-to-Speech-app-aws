<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text-to-Speech App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top, #4e94f4 0, #0b1630 55%, #050814 100%);
            color: #0f172a;
        }

        .container {
            background: rgba(15, 23, 42, 0.9);
            color: #e5e7eb;
            padding: 32px 28px;
            border-radius: 18px;
            width: 100%;
            max-width: 640px;
            box-shadow:
                0 24px 60px rgba(15, 23, 42, 0.75),
                0 0 0 1px rgba(148, 163, 184, 0.15);
            backdrop-filter: blur(18px);
            transform: translateY(0);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .container:hover {
            transform: translateY(-2px);
            box-shadow:
                0 32px 80px rgba(15, 23, 42, 0.9),
                0 0 0 1px rgba(148, 163, 184, 0.2);
        }

        .title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 6px;
        }

        h2 {
            font-size: 1.75rem;
            font-weight: 650;
            letter-spacing: 0.02em;
            color: #f9fafb;
        }

        .badge {
            padding: 4px 10px;
            font-size: 0.7rem;
            border-radius: 999px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            background: rgba(56, 189, 248, 0.15);
            color: #e0f2fe;
            border: 1px solid rgba(56, 189, 248, 0.45);
            white-space: nowrap;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #9ca3af;
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #9ca3af;
            margin-bottom: 6px;
        }

        textarea {
            width: 100%;
            padding: 12px 13px;
            border-radius: 10px;
            border: 1px solid rgba(148, 163, 184, 0.5);
            resize: vertical;
            min-height: 120px;
            max-height: 260px;
            font-size: 0.98rem;
            line-height: 1.5;
            outline: none;
            background: rgba(15, 23, 42, 0.8);
            color: #e5e7eb;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        textarea::placeholder {
            color: #6b7280;
        }

        textarea:focus {
            border-color: #4e94f4;
            box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.6), 0 0 0 8px rgba(37, 99, 235, 0.28);
            background: rgba(15, 23, 42, 0.95);
        }

        .textarea-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-top: 8px;
            margin-bottom: 18px;
            font-size: 0.8rem;
            color: #6b7280;
        }

        .char-count {
            font-variant-numeric: tabular-nums;
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 11px 14px;
            background: linear-gradient(135deg, #4e94f4, #2563eb);
            color: white;
            font-size: 0.98rem;
            font-weight: 600;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition:
                background 0.2s ease,
                transform 0.1s ease,
                box-shadow 0.2s ease,
                opacity 0.15s ease;
            box-shadow:
                0 14px 30px rgba(37, 99, 235, 0.45),
                0 0 0 1px rgba(59, 130, 246, 0.48);
        }

        button span.icon {
            font-size: 1rem;
        }

        button:hover:not(:disabled) {
            transform: translateY(-1px);
            background: linear-gradient(135deg, #5ea0ff, #1d4ed8);
            box-shadow:
                0 20px 40px rgba(37, 99, 235, 0.6),
                0 0 0 1px rgba(59, 130, 246, 0.6);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
            box-shadow:
                0 10px 25px rgba(37, 99, 235, 0.5),
                0 0 0 1px rgba(59, 130, 246, 0.6);
        }

        button:disabled {
            cursor: default;
            opacity: 0.6;
            box-shadow: none;
            background: linear-gradient(135deg, #4b5563, #374151);
        }

        audio {
            width: 100%;
            margin-top: 18px;
            border-radius: 999px;
            accent-color: #4e94f4;
            filter: drop-shadow(0 12px 26px rgba(15, 23, 42, 0.8));
        }

        .error-message {
            color: #fca5a5;
            font-size: 0.85rem;
            margin-top: 10px;
        }

        .status {
            font-size: 0.8rem;
            color: #9ca3af;
            min-height: 1em;
        }

        @media screen and (max-width: 640px) {
            .container {
                margin: 18px;
                padding: 22px 18px;
                border-radius: 16px;
            }

            h2 {
                font-size: 1.45rem;
            }

            .subtitle {
                font-size: 0.85rem;
            }

            button {
                font-size: 0.92rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="title-row">
            <h2>Text to Speech</h2>
            <div class="badge">AWS powered</div>
        </div>
        <p class="subtitle">Paste or type any text below and instantly generate clear, natural speech.</p>

        <label for="textInput">Your text</label>
        <textarea id="textInput" rows="5" placeholder="For example: Today we are testing our AWS text‑to‑speech app..."></textarea>

        <div class="textarea-footer">
            <span class="status" id="statusMessage"></span>
            <span class="char-count" id="charCount">0 characters</span>
        </div>

        <div class="actions">
            <button id="convertButton" onclick="convertTextToSpeech()">
                <span class="icon">🔊</span>
                <span>Convert to speech</span>
            </button>
        </div>

        <audio id="audioPlayer" controls></audio>
        <div id="errorMessage" class="error-message"></div>
    </div>

    <script>
        const textInput = document.getElementById("textInput");
        const charCount = document.getElementById("charCount");
        const statusMessage = document.getElementById("statusMessage");
        const convertButton = document.getElementById("convertButton");
        const errorMessage = document.getElementById("errorMessage");
        const audioPlayer = document.getElementById("audioPlayer");

        function updateCharCount() {
            const length = textInput.value.length;
            charCount.textContent = length === 1 ? "1 character" : `${length} characters`;
            convertButton.disabled = length === 0;
        }

        textInput.addEventListener("input", () => {
            errorMessage.textContent = "";
            statusMessage.textContent = "";
            updateCharCount();
        });

        updateCharCount();

        async function convertTextToSpeech() {
            const text = textInput.value.trim();
            errorMessage.textContent = "";
            statusMessage.textContent = "";

            if (!text) {
                errorMessage.textContent = "Please enter some text first.";
                return;
            }

            convertButton.disabled = true;
            const originalLabel = convertButton.innerHTML;
            convertButton.innerHTML = '<span class="icon">⏳</span><span>Converting...</span>';
            statusMessage.textContent = "Sending your text securely to AWS…";

            try {
                const response = await fetch("https://h3aqu11qg8.execute-api.us-east-1.amazonaws.com/prod/tts", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text })
                });

                const data = await response.json();
                console.log("API Response:", data);

                const parsedBody = typeof data.body === "string" ? JSON.parse(data.body) : data.body;
                console.log("Parsed Audio URL:", parsedBody?.audio_url);

                if (!parsedBody || !parsedBody.audio_url) {
                    console.error("Error: audio_url is missing from the response", parsedBody);
                    errorMessage.textContent = "We couldn't get an audio URL from the server. Please try again.";
                    return;
                }

                audioPlayer.src = parsedBody.audio_url;
                audioPlayer.play().catch(() => {
                    // Autoplay may be blocked; user can press play manually
                });
                statusMessage.textContent = "Speech generated successfully.";
            } catch (error) {
                console.error("Fetch error:", error);
                errorMessage.textContent = "An error occurred while generating speech. Please try again.";
            } finally {
                convertButton.disabled = textInput.value.trim().length === 0;
                convertButton.innerHTML = originalLabel;
            }
        }
    </script>
</body>

</html>
